name: Activity Forge

on:
  schedule:
    # Every 40 minutes (36 runs per day = ~21 commits/day)
    - cron: '0 * * * *'
    - cron: '40 * * * *'
    - cron: '20 * * * *'
  workflow_dispatch:  # manual trigger for testing

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run cycle
        id: cycle
        run: |
          cd scripts
          python run_cycle.py 2>&1 | tee /tmp/cycle_output.txt
          echo "output=$(tail -1 /tmp/cycle_output.txt)" >> $GITHUB_OUTPUT

      - name: Commit changes
        run: |
          git config user.name "King-Austin"
          git config user.email "nworahebuka.a@gmail.com"
          git add -A
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          DATE=$(date -u +%Y-%m-%d)
          # pick a commit prefix that looks like real dev work
          case $MIN in
            0)         PREFIX="docs: add TIL entry" ;;
            20)        PREFIX="feat: add algorithm snippet" ;;
            40)        PREFIX="chore: devlog update" ;;
          esac
          git diff --cached --quiet || git commit -m "${PREFIX} ${DATE} $(date -u +%H:%M)"

      - name: Push
        run: git push origin main